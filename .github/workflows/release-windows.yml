name: Release Windows Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller matplotlib

      - name: Build with PyInstaller
        run: |
          pyinstaller SearchingPro.spec

      - name: Zip output
        run: |
          Compress-Archive -Path dist/SearchingPro.exe -DestinationPath dist/SearchingPro-Windows-x64.zip

      - name: Upload to v1.0.0 Release
        run: |
          gh release upload v1.0.0 dist/SearchingPro-Windows-x64.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
